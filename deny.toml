# cargo-deny configuration -- run locally with `cargo deny check`,
# enforced in CI (see .github/workflows/ci.yml).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # quick-xml < 0.41: DoS via unbounded namespace allocation / quadratic
    # duplicate-attribute check when parsing XML. Transitive via rust-s3 and
    # aws-creds, both of which require ^0.38, so the fixed 0.41 is
    # unreachable until upstream bumps it. Exploitation requires a malicious
    # or compromised S3 endpoint parsing our own bucket's responses -- low
    # risk for this tool. Revisit on rust-s3 releases (or the aws-sdk-s3
    # migration, issue #34).
    { id = "RUSTSEC-2026-0194", reason = "transitive via rust-s3 ^0.38; fix is semver-incompatible upstream" },
    { id = "RUSTSEC-2026-0195", reason = "transitive via rust-s3 ^0.38; fix is semver-incompatible upstream" },
    # paste is archived/unmaintained. Compile-time proc-macro only, pulled in
    # transitively by the clickhouse crate.
    { id = "RUSTSEC-2024-0436", reason = "compile-time proc-macro, transitive via clickhouse" },
]

[licenses]
version = 2
# Permissive licenses, plus weak-copyleft MPL-2.0 (attohttpc, minidom via
# rust-s3: file-level copyleft, fine for an unmodified dependency) and
# CC0-1.0 (tiny-keccak). Extend deliberately if a new dependency needs it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
# Duplicate crate versions are common in this tree (two HTTP stacks); warn
# so they show up without failing the build.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
