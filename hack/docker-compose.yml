services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native interface
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/backup.xml:ro
#      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickvault
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--password",
          "clickvault",
          "--query",
          "SELECT 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    ports:
      - "9002:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - rustfs-data:/data
    environment:
      RUSTFS_ACCESS_KEY: clickvault-access
      RUSTFS_SECRET_KEY: clickvault-secret-key
      RUSTFS_CONSOLE_ENABLE: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs:9000 clickvault-access clickvault-secret-key;
      mc mb rustfs/clickvault-backups --ignore-existing;
      echo 'Bucket clickvault-backups created';
      "

volumes:
  clickhouse-data:
  rustfs-data:
