[clickhouse]
url = "http://localhost:8123"
# user = "default"              # or set CLICKVAULT_CLICKHOUSE_USER
# password = ""                 # or set CLICKVAULT_CLICKHOUSE_PASSWORD
database = "mydb"

[s3]
endpoint = "https://s3.amazonaws.com"
# S3 endpoint as reachable from the ClickHouse server, if different from the
# above — e.g. a Docker-internal URL like "http://minio:9000". Defaults to
# `endpoint`.
# clickhouse_endpoint = "http://minio:9000"
bucket = "my-backup-bucket"
prefix = "clickhouse-backups"
region = "eu-central-1"
# access_key = "AKIA..."       # or set CLICKVAULT_S3_ACCESS_KEY
# secret_key = "..."           # or set CLICKVAULT_S3_SECRET_KEY
# path_style = true            # required for MinIO/RustFS

# Backup execution tuning (optional; defaults shown).
# [backup]
# poll_interval_secs = 5      # seconds between system.backups progress polls
# timeout_secs = 86400        # give up on a backup after this long (24h)

# Retry tuning for S3 operations, ClickHouse status reads, and notification
# sends (optional; defaults shown). Exponential backoff with jitter.
# [retry]
# attempts = 3                # total attempts per operation (1 = no retry)
# base_delay_ms = 200         # first backoff; doubles per attempt
# max_delay_ms = 5000         # ceiling for a single backoff sleep

[schedule]
# Create a full backup every 7 days; incremental backups in between.
full_backup_interval_days = 7

[retention]
# Keep the last 4 full backup chains (each chain = 1 full + its incrementals).
keep_full_backups = 4
# Run cleanup after each successful backup instead of a separate cron entry.
# auto_cleanup = false

[notifications]
on_success = true
on_failure = true

# Slack webhook notification
# [[notifications.providers]]
# type = "slack"
# webhook_url = "https://hooks.slack.com/services/T.../B.../xxx"

# Generic HTTP webhook notification
# [[notifications.providers]]
# type = "webhook"
# url = "https://monitoring.example.com/api/alerts"
# method = "POST"
# headers = { Authorization = "Bearer token123" }
